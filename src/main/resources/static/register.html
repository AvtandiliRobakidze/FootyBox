<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account - FootyBox</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="icon" type="image/png" href="/assets/img/footybox-logo.png">
</head>
<body data-chrome="false">
  <a href="/" class="auth-back">&larr; Back to FootyBox</a>
  <div class="auth">
    <div class="auth-visual">
      <img src="/assets/placeholders/archive-wall.webp" alt="Football crowd and stadium atmosphere">
      <div class="v-inner">
        <a class="brand" href="/">Footy<span class="b">box</span></a>
        <div class="v-quote">
          <h2>Your football life, logged forever.</h2>
          <p>Build a lifelong diary of matches, reviews, stadium nights, favourites, and unforgettable football memories.</p>
        </div>
      </div>
    </div>
    <div class="auth-form-wrap">
      <div class="auth-card reveal in">
        <div class="seg">
          <button type="button" onclick="window.location.href='/login.html'">Sign in</button>
          <button class="active" type="button">Create account</button>
        </div>
        <div class="auth-pane active">
          <h1>Start your diary.</h1>
          <p class="sub">Create your account and log your first match.</p>
          <form id="signupForm" data-register-form>
            <div class="auth-field">
              <label for="su-name">Display name</label>
              <input class="input" type="text" id="su-name" name="displayName" placeholder="e.g. Alex Moreau" autocomplete="name" required>
            </div>
            <div class="auth-field">
              <label for="su-username">Username</label>
              <input class="input" type="text" id="su-username" name="username" placeholder="archivecaptain" autocomplete="username" required>
            </div>
            <div class="auth-field">
              <label for="su-email">Email</label>
              <input class="input" type="email" id="su-email" name="email" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="auth-field">
              <label for="su-pass">Password</label>
              <input class="input" type="password" id="su-pass" name="password" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">Create account</button>
          </form>
          <p class="auth-message" data-auth-message aria-live="polite"></p>
          <div class="auth-switch">Already have an account? <a href="/login.html">Sign in</a></div>
        </div>
      </div>
    </div>
  </div>
  <script src="/assets/js/ui.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
