spring:
  datasource:
    url: jdbc:h2:mem:footybox;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  docker:
    compose:
      enabled: false

footybox:
  jwt:
    secret: test-footybox-secret-key-change-me-please-32
    expiration-minutes: 60
  football-data:
    base-url: https://example.invalid
    token:
    rate-limit-delay-ms: 0
